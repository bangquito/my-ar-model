<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebAR Model Viewer</title>

  <!-- Use A-Frame 1.5.0 for better compatibility with MindAR 1.2.5 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    /* Overlay styles - simplified */
    .overlay {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999; /* Ensure it's above the AR scene */
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 20px;
      border-radius: 10px;
      font-family: sans-serif;
      pointer-events: none; /* Allows clicks to pass through to AR scene */
      width: 80%;
      max-width: 300px;
    }
    .top { top: 20px; }
    .bottom { bottom: 20px; }
  </style>
</head>
<body>
  <div class="overlay top">Scanning for target...</div>
  <div class="overlay bottom">Point camera at the artwork</div>

  <!-- Note: renderer settings updated for A-Frame 1.5.0 standards -->
  <a-scene
    mindar-image="imageTargetSrc: ./target.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="./ochobot.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Basic Lighting -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="0 10 0" intensity="0.5"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#model"
        position="0 0 0" 
        rotation="90 0 0" 
        scale="0.1 0.1 0.1"
      ></a-gltf-model>
    </a-entity>
  </a-scene>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>WebAR Model Viewer</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    canvas {
      position: fixed !important;
      inset: 0;
    }

    .overlay {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      backdrop-filter: blur(4px);
    }

    .top {
      top: 20px;
    }

    .bottom {
      bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="overlay top">Scan the target image to view the 3D model</div>
  <div class="overlay bottom">Point your camera at the printed artwork</div>

  <a-scene
    mindar-image="imageTargetSrc: ./target.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="./model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity light="type: ambient; intensity: 1"></a-entity>
    <a-entity light="type: directional; intensity: 1.2" position="1 2 1"></a-entity>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#model"
        position="0 0 0.1"
        rotation="0 0 0"
        scale="0.2 0.2 0.2"
        animation="property: scale; from: 0.01 0.01 0.01; to: 0.2 0.2 0.2; dur: 800; easing: easeOutBack; startEvents: targetFound"
      ></a-gltf-model>
    </a-entity>
  </a-scene>
</body>
</html>

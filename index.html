<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AR Model</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
    }
    model-viewer {
      width: 100vw;
      height: 80vh;
      background: #111;
    }
    p {
      margin: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <model-viewer
    src="./model.glb"
    ios-src="./model.usdz"
    alt="3D model"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>

  <p>Open on mobile and tap the AR button</p>
</body>
</html>
